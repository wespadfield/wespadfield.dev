site_name: Wes Padfield
site_description: Linux systems, RHEL labs, and sysadmin field notes
site_url: https://wespadfield.dev

theme:
  name: material
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: teal
      accent: deep orange

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: teal
      accent: deep orange
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: fontawesome/solid/w
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - About: about.md
  - Notes:
      - notes/index.md
  - Labs:
      - labs/index.md
      - Starting my RHCSA lab notebook: labs/rhcsa-lab-notebook-start.md
      - RHCSA lab environment: labs/rhcsa-lab-environment.md
  - Troubleshooting:
      - troubleshooting/index.md
  - Scripts:
      - scripts/index.md

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
