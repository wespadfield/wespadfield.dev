# Project information
site_name: Wes Padfield
site_description: Linux systems, RHEL labs, and sysadmin field notes
site_url: https://wespadfield.dev
site_author: Wes Padfield

# Repository
repo_name: wespadfield/wespadfield.dev
repo_url: https://github.com/wespadfield/wespadfield.dev
edit_uri: edit/main/docs/

# Configuration
theme:
  name: material
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: teal
      accent: indigo

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: teal
      accent: indigo
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/alpha-w-box
  features:
    # - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    # - content.footnote.tooltips
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  favicon: images/favicon.svg

# Page tree
nav:
  - Home: index.md
  - Notes:
      - notes/index.md
  - Labs:
      - labs/index.md
      - Starting my RHCSA lab notebook: labs/rhcsa-lab-notebook-start.md
      - RHCSA lab environment: labs/rhcsa-lab-environment.md
  - Troubleshooting:
      - troubleshooting/index.md
  - Scripts:
      - scripts/index.md
  - About: about.md

# Plugins
plugins:
  - search
  - tags

# Extensions
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
